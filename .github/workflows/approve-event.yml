name: 🔖 Approve Event via Comment

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  approve:
    if: |
      (github.event.comment.body == '/approve' || github.event.comment.body == '/reject') &&
      !github.event.issue.pull_request
    runs-on: ubuntu-latest

    steps:
      - name: Verificar permisos del comentador
        id: check-permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const allowed = ['admin', 'write'].includes(perm.permission);
            console.log(`Usuario: ${context.actor} | Permiso: ${perm.permission} | Permitido: ${allowed}`);
            core.setOutput('allowed', allowed ? 'true' : 'false');

      - name: Aplicar /approve
        if: |
          steps.check-permission.outputs.allowed == 'true' &&
          github.event.comment.body == '/approve'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue.number;
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue, labels: ['approved'],
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue, name: 'pendiente',
              });
            } catch {}
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: '+1',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue,
              body: `✅ **Evento aprobado** por @${context.actor}.\n\nEl sitio se actualizará automáticamente en unos minutos. 🚀`,
            });

      - name: Aplicar /reject
        if: |
          steps.check-permission.outputs.allowed == 'true' &&
          github.event.comment.body == '/reject'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue.number;
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue, labels: ['rechazado'],
            });
            for (const label of ['pendiente', 'approved']) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue, name: label,
                });
              } catch {}
            }
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: '-1',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue,
              body: `❌ **Evento rechazado** por @${context.actor}.\n\nSi crees que es un error, edita el issue y solicita una nueva revisión.`,
            });

      - name: Sin permisos — ignorar
        if: steps.check-permission.outputs.allowed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: 'confused',
            });
            console.log(`⛔ ${context.actor} no tiene permisos.`);

      # El sync y despliegue ahora se maneja automáticamente por 'sync-events.yml'
      # gracias al trigger 'workflow_run' cuando este workflow termina con éxito.
