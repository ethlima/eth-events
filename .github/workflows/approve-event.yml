name: 🔖 Approve Event via Comment

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  approve:
    if: |
      (github.event.comment.body == '/approve' || github.event.comment.body == '/reject') &&
      !github.event.issue.pull_request
    runs-on: ubuntu-latest

    steps:
      - name: Verificar permisos del comentador
        id: check-permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const allowed = ['admin', 'write'].includes(perm.permission);
            console.log(`Usuario: ${context.actor} | Permiso: ${perm.permission} | Permitido: ${allowed}`);
            core.setOutput('allowed', allowed ? 'true' : 'false');

      - name: Aplicar /approve
        if: |
          steps.check-permission.outputs.allowed == 'true' &&
          github.event.comment.body == '/approve'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue.number;
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue, labels: ['approved'],
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue, name: 'pendiente',
              });
            } catch {}
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: '+1',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue,
              body: `✅ **Evento aprobado** por @${context.actor}.\n\nEl sitio se actualizará automáticamente en unos minutos. 🚀`,
            });

      - name: Aplicar /reject
        if: |
          steps.check-permission.outputs.allowed == 'true' &&
          github.event.comment.body == '/reject'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue.number;
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue, labels: ['rechazado'],
            });
            for (const label of ['pendiente', 'approved']) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue, name: label,
                });
              } catch {}
            }
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: '-1',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue,
              body: `❌ **Evento rechazado** por @${context.actor}.\n\nSi crees que es un error, edita el issue y solicita una nueva revisión.`,
            });

      - name: Sin permisos — ignorar
        if: steps.check-permission.outputs.allowed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: 'confused',
            });
            console.log(`⛔ ${context.actor} no tiene permisos.`);

      # ── SYNC INLINE (sin workflow_dispatch, evita el 403) ─────────────────
      - name: Checkout
        if: steps.check-permission.outputs.allowed == 'true'
        uses: actions/checkout@v4

      - name: Regenerar events.json
        if: steps.check-permission.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'approved',
              state: 'open',
              per_page: 100,
            });

            function extract(body, heading) {
              if (!body) return '';
              const re = new RegExp(
                '###[^\\n]*' + heading + '[^\\n]*\\n+([\\s\\S]*?)(?=\\n###|$)',
                'i'
              );
              const m = body.match(re);
              if (!m) return '';
              return m[1].replace(/<!--.*?-->/gs, '').replace(/_No response_/gi, '').trim();
            }

            const events = issues.map(issue => {
              const body = issue.body || '';
              return {
                id: issue.number,
                title: extract(body, 'Nombre') || issue.title.replace(/\[EVENTO\]\s*/i, ''),
                description: extract(body, 'Descripci'),
                date: extract(body, 'Fecha'),
                time: extract(body, 'Hora'),
                location: extract(body, 'Ubicaci'),
                type: (extract(body, 'Tipo') || 'meetup').toLowerCase().replace(/[^a-z]/g, ''),
                link: extract(body, 'Link'),
                tags: extract(body, 'Tags').split(',').map(t => t.trim()).filter(Boolean),
                organizer: extract(body, 'Organizador'),
                issueUrl: issue.html_url,
                issueNum: issue.number,
                createdAt: issue.created_at,
              };
            });

            events.sort((a, b) => {
              if (!a.date) return 1;
              if (!b.date) return -1;
              return new Date(a.date) - new Date(b.date);
            });

            fs.writeFileSync('events.json', JSON.stringify(events, null, 2));
            console.log('✅ events.json generado con ' + events.length + ' eventos');

      - name: Commit events.json
        if: steps.check-permission.outputs.allowed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --cached --quiet || git commit -m "chore: sync events.json [skip ci]"
          git push
