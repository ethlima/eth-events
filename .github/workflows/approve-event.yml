name: 🔖 Approve Event via Comment

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: write

jobs:
  approve:
    if: |
      (github.event.comment.body == '/approve' || github.event.comment.body == '/reject') &&
      !github.event.issue.pull_request
    runs-on: ubuntu-latest

    steps:
      - name: Verificar permisos del comentador
        id: check-permission
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });
            const allowed = ['admin', 'write'].includes(perm.permission);
            console.log(`Usuario: ${context.actor} | Permiso: ${perm.permission} | Permitido: ${allowed}`);
            core.setOutput('allowed', allowed ? 'true' : 'false');

      - name: Aplicar /approve
        if: |
          steps.check-permission.outputs.allowed == 'true' &&
          github.event.comment.body == '/approve'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue.number;
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue, labels: ['approved'],
            });
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue, name: 'pendiente',
              });
            } catch {}
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: '+1',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue,
              body: `✅ **Evento aprobado** por @${context.actor}.\n\nEl sitio se actualizará automáticamente en unos minutos. 🚀`,
            });

      - name: Aplicar /reject
        if: |
          steps.check-permission.outputs.allowed == 'true' &&
          github.event.comment.body == '/reject'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.issue.number;
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue, labels: ['rechazado'],
            });
            for (const label of ['pendiente', 'approved']) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue, name: label,
                });
              } catch {}
            }
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: '-1',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue,
              body: `❌ **Evento rechazado** por @${context.actor}.\n\nSi crees que es un error, edita el issue y solicita una nueva revisión.`,
            });

      - name: Sin permisos — ignorar
        if: steps.check-permission.outputs.allowed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: 'confused',
            });
            console.log(`⛔ ${context.actor} no tiene permisos.`);

      # ── SYNC & DEPLOY INLINE ─────────────────
      - name: Checkout
        if: steps.check-permission.outputs.allowed == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.check-permission.outputs.allowed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerar events.json
        if: steps.check-permission.outputs.allowed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'approved',
                state: 'all',
                per_page: 100,
              }
            );

            function extract(body, heading) {
              if (!body) return '';
              const re = new RegExp(
                `###\\s*[^\\n]*${heading}[^\\n]*\\n+([\\s\\S]*?)(?=\\n###|$)`,
                'i'
              );
              const m = body.match(re);
              if (!m) return '';
              return m[1]
                .replace(/<!--.*?-->/gs, '')
                .replace(/_No response_/gi, '')
                .trim();
            }

            function clean(str) {
              return (str || '')
                .replace(/^```markdown\s*/gi, '')
                .replace(/```\s*$/g, '')
                .trim();
            }

            const events = issues.map(issue => {
              const body = issue.body || '';
              const rawDate = clean(extract(body, 'Fecha'));
              const parsedDate = rawDate ? new Date(rawDate) : null;

              return {
                id: issue.number,
                title: clean(
                  extract(body, 'Nombre') ||
                  issue.title.replace(/\[EVENTO\]\s*/i, '')
                ),
                description: clean(extract(body, 'Descripci')),
                date: rawDate,
                endDate: clean(extract(body, 'Fecha de fin') || extract(body, 'Término') || extract(body, 'Fin')),
                time: clean(extract(body, 'Hora')),
                location: clean(extract(body, 'Ubicaci')),
                type: clean(
                  (extract(body, 'Tipo') || 'meetup')
                    .toLowerCase()
                    .replace(/[^a-z]/g, '')
                ),
                link: clean(extract(body, 'Link')),
                tags: clean(extract(body, 'Tags'))
                  .split(',')
                  .map(t => t.trim().toLowerCase())
                  .filter(Boolean),
                organizer: clean(extract(body, 'Organizador')),
                issueUrl: issue.html_url,
                issueNum: issue.number,
                state: issue.state,
                createdAt: issue.created_at,
                _sortDate: parsedDate && !isNaN(parsedDate) ? parsedDate : null,
              };
            });

            events.sort((a, b) => {
              if (!a._sortDate) return 1;
              if (!b._sortDate) return -1;
              return a._sortDate - b._sortDate;
            });

            const finalEvents = events.map(({ _sortDate, ...rest }) => rest);
            fs.writeFileSync('events.json', JSON.stringify(finalEvents, null, 2));

      - name: Commit events.json
        if: steps.check-permission.outputs.allowed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add events.json
          git diff --cached --quiet || git commit -m "chore: sync events.json [skip ci]"
          git push origin main

      - name: Setup Pages
        if: steps.check-permission.outputs.allowed == 'true'
        uses: actions/configure-pages@v4

      - name: Upload artifact
        if: steps.check-permission.outputs.allowed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        if: steps.check-permission.outputs.allowed == 'true'
        uses: actions/deploy-pages@v4
