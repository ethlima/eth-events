name: 📅 Sync Events from Issues

on:
  issues:
    types: [opened, edited, labeled, unlabeled, closed, reopened]
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: sync-events
  cancel-in-progress: true

jobs:
  sync-events:
    runs-on: ubuntu-latest
    name: Parse issues → events.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate events.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            // Paginación completa
            const issues = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'approved',
                state: 'open',
                per_page: 100,
              }
            );

            function extract(body, heading) {
              if (!body) return '';
              const re = new RegExp(
                `###\\s*[^\\n]*${heading}[^\\n]*\\n+([\\s\\S]*?)(?=\\n###|$)`,
                'i'
              );
              const m = body.match(re);
              if (!m) return '';
              return m[1]
                .replace(/<!--.*?-->/gs, '')
                .replace(/_No response_/gi, '')
                .trim();
            }

            function clean(str) {
              return (str || '').trim();
            }

            const events = issues.map(issue => {
              const body = issue.body || '';

              const rawDate = clean(extract(body, 'Fecha'));
              const parsedDate = rawDate ? new Date(rawDate) : null;

              return {
                id: issue.number,
                title: clean(
                  extract(body, 'Nombre') ||
                  issue.title.replace(/\[EVENTO\]\s*/i, '')
                ),
                description: clean(extract(body, 'Descripci')),
                date: rawDate,
                time: clean(extract(body, 'Hora')),
                location: clean(extract(body, 'Ubicaci')),
                type: clean(
                  (extract(body, 'Tipo') || 'meetup')
                    .toLowerCase()
                    .replace(/[^a-z]/g, '')
                ),
                link: clean(extract(body, 'Link')),
                tags: clean(extract(body, 'Tags'))
                  .split(',')
                  .map(t => t.trim().toLowerCase())
                  .filter(Boolean),
                organizer: clean(extract(body, 'Organizador')),
                issueUrl: issue.html_url,
                issueNum: issue.number,
                createdAt: issue.created_at,
                _sortDate: parsedDate && !isNaN(parsedDate) ? parsedDate : null,
              };
            });

            // Orden robusto
            events.sort((a, b) => {
              if (!a._sortDate) return 1;
              if (!b._sortDate) return -1;
              return a._sortDate - b._sortDate;
            });

            // Remover campo interno
            const finalEvents = events.map(({ _sortDate, ...rest }) => rest);

            fs.writeFileSync(
              'events.json',
              JSON.stringify(finalEvents, null, 2)
            );

            console.log(`✅ Generados ${finalEvents.length} eventos`);

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add events.json
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "chore: sync events.json [skip ci]"

          # sync seguro
          git pull --rebase origin main
          git push origin main
